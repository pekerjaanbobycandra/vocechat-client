name: Build APK Desa Cluring

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Kembali ke versi terbaru agar Dart tidak error

      - name: Ambil Dependencies
        run: flutter pub get

      - name: Buat Kamus Bahasa (Localization)
        run: flutter gen-l10n

      - name: Build APK Android
        run: flutter build apk --release

      - name: Simpan Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Desa-Cluring
          path: build/app/outputs/flutter-apk/app-release.apk