name: Build APK Desa Cluring

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter (Kembali ke Terbaru)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Sinkronisasi Versi SDK (Perbaikan Otomatis)
        run: sed -i 's/>=2.17.0 <3.0.0/>=3.0.0 <4.0.0/g' pubspec.yaml

      - name: Bersihkan Sisa Build
        run: flutter clean

      - name: Ambil Dependencies
        run: flutter pub get

      - name: Buat File Auto-Generate (Build Runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Buat Kamus Bahasa (Localization)
        run: flutter gen-l10n

      - name: Segarkan Memori Tautan (Kunci Solusi)
        run: flutter pub get

      - name: Build APK Android
        run: flutter build apk --release

      - name: Simpan Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Desa-Cluring
          path: build/app/outputs/flutter-apk/app-release.apk
